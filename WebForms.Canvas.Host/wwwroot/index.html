<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas.Windows.Forms.Host</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="Canvas.Windows.Forms.Host.styles.css" rel="stylesheet" />
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="_content/Canvas.Windows.Forms/canvas-renderer.js"></script>
    <script>
        // Simple wrapper for OS page canvas rendering
        window.canvasRenderer = {
            render: function(canvas, commands) {
                if (!canvas || !commands) return;
                // Use the existing renderClientAreaCommands with no offset
                window.renderClientAreaCommands(canvas, 0, 0, commands);
            }
        };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>

</html>
